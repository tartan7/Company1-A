# Legacy URL redirect map for UniteCube
#
# Rules are ordered as follows:
# 1) Exact legacy paths that moved (301)
# 2) Pattern-based legacy structures (301)
# 3) Intentionally retired legacy endpoints (410)

# 1:1 redirects for moved pages.
location = /index.html {
    return 301 /dashboard.html;
}

location = /dashboard/index.html {
    return 301 /dashboard.html;
}

location = /workflows/index.html {
    return 301 /workflows.html;
}

location = /support/index.html {
    return 301 /support.html;
}

# Pattern redirects for structural changes.
# Legacy extensionless routes -> current .html routes.
location ~* ^/(dashboard|workflows|support)/?$ {
    return 301 /$1.html;
}

# Legacy container routes -> current top-level routes.
location ~* ^/(?:app|portal)/(dashboard|workflows|support)/?$ {
    return 301 /$1.html;
}

# Intentionally removed legacy endpoints.
location = /index.php {
    return 410;
}

location = /home.php {
    return 410;
}

location = /wp-login.php {
    return 410;
}

location = /xmlrpc.php {
    return 410;
}

location ~* ^/(?:wp-admin|wp-content|wp-includes)(?:/.*)?$ {
    return 410;
}

location ~* ^/(?:feed|rss|atom)(?:/.*)?$ {
    return 410;
}
