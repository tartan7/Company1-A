# UniteCube production host (local-folder deployment model)
# Install path: /etc/nginx/sites-available/unitecube.conf
# Symlink path: /etc/nginx/sites-enabled/unitecube.conf

server {
    listen 80;
    listen [::]:80;
    server_name unitecube.jp www.unitecube.jp;

    root /home/tartan/workspace/www/unitecube;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name unitecube.jp www.unitecube.jp;

    root /home/tartan/workspace/www/unitecube;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/unitecube.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/unitecube.jp/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    error_page 404 /404.html;

    # Include legacy redirect and 410 rules before static file resolution.
    # Deploy this include as /etc/nginx/snippets/unitecube-redirect-map.conf.
    include /etc/nginx/snippets/unitecube-redirect-map.conf;

    location = /404.html {
        internal;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }
}
