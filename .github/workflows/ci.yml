name: Lint and Test

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Check public directory
        run: |
          test -d public
          test -f public/index.html
          ls -la public

      - name: Lint
        run: npm run lint

      - name: Start static server
        run: |
          npm run serve > /tmp/static-server.log 2>&1 &
          echo $! > /tmp/static-server.pid

      - name: Wait for server
        run: npx wait-on http://127.0.0.1:8080

      - name: Smoke test
        run: npm test

      - name: Show server log on failure
        if: failure()
        run: cat /tmp/static-server.log || true

      - name: Stop static server
        if: always()
        run: |
          if [ -f /tmp/static-server.pid ]; then
            kill "$(cat /tmp/static-server.pid)" || true
          fi
