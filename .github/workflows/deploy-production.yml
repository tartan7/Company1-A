name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "public/**"
      - "docs/**/*.html"
      - "scripts/**"
      - ".github/workflows/deploy-production.yml"

jobs:
  deploy:
    name: Deploy Static Site Locally
    runs-on: self-hosted
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy script
        run: test -x scripts/deploy-prod.sh

      - name: Validate local deploy wrapper
        run: test -x scripts/deploy-local.sh

      - name: Validate smoke test script
        run: test -x scripts/smoke-test.sh

      - name: Deploy to local production folder
        env:
          SRC_DIR: ${{ github.workspace }}/public
          DOCS_SRC_DIR: ${{ github.workspace }}/docs
          DEST_DIR: /home/tartan/workspace/www/unitecube
        run: |
          set -euo pipefail
          bash scripts/deploy-prod.sh

      - name: Smoke test production
        env:
          PROD_BASE_URL: ${{ vars.PROD_BASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${PROD_BASE_URL:-}" ]; then
            echo "::warning::PROD_BASE_URL is not set in repository/environment variables; skipping smoke test."
            exit 0
          fi
          bash scripts/smoke-test.sh "$PROD_BASE_URL"
